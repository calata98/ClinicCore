services:
  postgres:
    image: postgres:18-alpine
    container_name: cliniccore-postgres
    environment:
      POSTGRES_DB: cliniccore
      POSTGRES_USER: cliniccore
      POSTGRES_PASSWORD: cliniccore
    ports:
      - "5432:5432"
    volumes:
      - cliniccore-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cliniccore -d cliniccore"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cliniccore-postgres-data:
